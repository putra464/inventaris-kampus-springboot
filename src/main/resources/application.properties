spring.application.name=inventaris-kampus

# ===== KONFIGURASI DATABASE POSTGRESQL =====
spring.datasource.url=jdbc:postgresql://localhost:5432/db_inventaris
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# ===== KONFIGURASI JPA HIBERNATE =====
# Mode create-drop: buat ulang tabel setiap kali aplikasi restart
# Mode update: update skema berdasarkan entity (untuk production)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ===== KONFIGURASI THYMELEAF =====
spring.thymeleaf.cache=false
spring.thymeleaf.enabled=true
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.mode=HTML
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# ===== KONFIGURASI WEB =====
spring.web.resources.static-locations=classpath:/static/
spring.mvc.static-path-pattern=/static/**

# ===== KONFIGURASI SERVER =====
server.port=8080
server.servlet.context-path=/
server.error.include-message=always
server.error.include-binding-errors=always

# ===== KONFIGURASI FILE UPLOAD =====
# Maksimal ukuran file upload: 10MB
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ===== KONFIGURASI LOG =====
logging.level.root=INFO
logging.level.com.kampus.inventaris=DEBUG
logging.level.org.hibernate.SQL=DEBUG
